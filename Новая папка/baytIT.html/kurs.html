<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Kurslar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #b7b6b6;
        }


          nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        h1 {
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            justify-content: center;
        }

        .card {
            width: 500px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            background: white;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .play {
            background: green;
            color: white;
            border-radius: 50%;
            padding: 10px 15px;
        }
          header { 
           
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 40px; 
            background: #fff; 
            border-bottom: 1px solid #eee; 
            border-radius: 15px;
            
        }
        .logo { 
            font-size: 24px; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            gap: 5px;
            
        }
        .logo span { color: #ff5722; font-size: 28px; }
        
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { 
            padding: 8px 20px; 
            background: #f0f2f5; 
            border-radius: 20px; 
            font-weight: 500; 
            font-size: 14px;
            text-decoration: none;
        }
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .icon { 
            width: 40px; height: 40px; 
            background: #fff; 
            border: 1px solid #ddd;
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    
<header style="background-color: #777;">
        <div class="logo">
            <a href="dashboard.html" style="text-decoration: none; color: white;">🗯️Bayt IT</a>
        </div>
        <div class="nav-links">
            <a href="kurs.html" style="background: #777; border: 1px solid #ddd; color: white;">Kurslar</a>
            <a href="CoinShop.html" style=" border: 1px solid #ddd; color: white; background-color: #777;">CoinShop</a>
        </div>
        <div class="header-icons">
           
            <a class="icon" href="#">👤</a>
        </div>
    </header>

<h1>Sizning kurslaringiz</h1>

<div class="container">

    <div class="card" onclick="openCourse('ai')" >
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwi5TjIYcHc4nnCO1VXDlz-nR5xGoWApmuqA&s" alt="">
        <div class="card-body">
            <span >Suniy Intellekt</span>
            <span class="play">▶</span>
        </div>
    </div>

    <div class="card" onclick="openCourse('pc')"  >
        <img src="https://i.ytimg.com/vi/lQyKo3kTvM4/hqdefault.jpg?v=6315f8d2" alt="">
        <div class="card-body">
            <span>Kompyuter Savodxonligi</span>
            <span class="play">▶</span>
        </div>
    </div>

    <div class="card" onclick="openCourse('web')"  >
        <img src="https://www.texnoman.uz/uploads/blogs/ce62f67dec75dc457a55772aa2449faf.png" alt="">
        <div class="card-body">
            <span>Web Dasturlash </span>
            <span class="play">▶</span>
        </div>
    </div>

</div>

<script>
function openCourse(course) {
    if(course === 'ai'){
        window.location.href = "ai.html";
    }
    if(course === 'pc'){
        window.location.href = "pc.html";
    }
    if(course === 'web'){
        window.location.href = "web.html";
    }
}
</script>

</body>
</html>
