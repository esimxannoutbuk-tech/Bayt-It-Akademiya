<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Junior - Bosh Sahifa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fb; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }

        /* Navbar */
        .navbar { display: flex; justify-content: space-between; padding-bottom: 20px; }
        .logo { font-weight: 800; font-size: 22px; }

        /* Banner */
        .banner { background: white; padding: 30px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stats { display: flex; gap: 10px; margin-top: 15px; }
        .stat { background: #f0f0f0; padding: 8px 15px; border-radius: 20px; font-weight: 600; }

        /* Kurslar qismi */
        .courses-section { margin-top: 40px; }
        .courses-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .course-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 5px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .course-card:hover { transform: translateY(-5px); }
        .course-img { width: 100%; height: 160px; border-radius: 15px; background-color: #ddd; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .course-card h3 { margin: 15px 0 5px; }
        .course-card p { color: #777; font-size: 14px; }
        header { 
           
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 40px; 
            background: #fff; 
            border-bottom: 1px solid #eee; 
            border-radius: 15px;
            
        }
        .logo { 
            font-size: 24px; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            gap: 5px;
            
        }
        .logo span { color: #ff5722; font-size: 28px; }
        
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { 
            padding: 8px 20px; 
            background: #f0f2f5; 
            border-radius: 20px; 
            font-weight: 500; 
            font-size: 14px;
            text-decoration: none;
        }
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .icon { 
            width: 40px; height: 40px; 
            background: #fff; 
            border: 1px solid #ddd;
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

<div class="container">
   <header style="background-color: #777;">
        <div class="logo">
            <a href="dashboard.html" style="text-decoration: none; color: white;">🗯️Bayt IT</a>
        </div>
        <div class="nav-links">
            <a href="kurs.html" style="background: #777; border: 1px solid #ddd; color: white;">Kurslar</a>
            <a href="CoinShop.html" style=" border: 1px solid #ddd; color: white; background-color: #777;">CoinShop</a>
        </div>
        <div class="header-icons">
           
            <a class="icon" href="#">👤</a>
        </div>
    </header>

    <div class="banner">
        <div>
            <h1>Salom, Rustamov Esimxon!</h1>
            <div class="stats">
                <div class="stat">⚡ 0</div>
                <div class="stat">🪙 0</div>
            </div>
        </div>
        <div style="font-size: 50px;">🧑‍💻</div>
    </div>

    <div class="courses-section">
        <h2>Sizning kurslaringiz</h2>
        <div class="courses-grid">
            <div class="course-card" onclick="window.location.href='suniy_intellekt.html'">
                <div class="course-img" style="background-color: #d1c4e9;">AI Rasm</div>
                <h3>Sun'iy Intellekt</h3>
                <p>Boshlang'ich daraja</p>
            </div>
            <div class="course-card" onclick="window.location.href='pc_kursi.html'">
                <div class="course-img" style="background-color: #81d4fa;">PC Rasm</div>
                <h3>Kompyuter Savodxonligi</h3>
                <p>Amaliy mashg'ulotlar</p>
            </div>
            <div class="course-card" onclick="window.location.href='web_dasturlash.html'">
                <div class="course-img" style="background-color: #ffab91;">WEB Rasm</div>
                <h3>Web Dasturlash</h3>
                <p>Frontend va Backend</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
